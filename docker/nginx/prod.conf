# Redirecionar HTTP para HTTPS
server {
    listen 80;
    server_name crohncare.online www.crohncare.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crohncare.online www.crohncare.online;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Storage (fotos de comprovação, etc.)
    location /storage {
        alias /var/www/backend/public/storage;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API routes
    location /api {
        root /var/www/backend/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        root /var/www/backend/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP
    location ~ \.php$ {
        root /var/www/backend/public;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Service Worker - sem cache
    location = /sw.js {
        root /var/www/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest
    location = /manifest.webmanifest {
        root /var/www/frontend/dist;
        add_header Cache-Control "no-cache";
    }

    # Firebase messaging SW
    location = /firebase-messaging-sw.js {
        root /var/www/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Frontend (SPA)
    location / {
        root /var/www/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webmanifest)$ {
            root /var/www/frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
