services:
  app:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis
    environment:
      - APP_NAME=CrohnCare
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-chroncare}
      - DB_USERNAME=${DB_USERNAME:-chroncare}
      - DB_PASSWORD=${DB_PASSWORD:-chroncare}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - QUEUE_CONNECTION=redis
    restart: unless-stopped

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend/dist:/var/www/frontend/dist
      - ssl-certs:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped

  scheduler:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis
    environment:
      - APP_NAME=CrohnCare
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-chroncare}
      - DB_USERNAME=${DB_USERNAME:-chroncare}
      - DB_PASSWORD=${DB_PASSWORD:-chroncare}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - QUEUE_CONNECTION=redis
    command: php artisan schedule:work
    restart: unless-stopped

  queue:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis
    environment:
      - APP_NAME=CrohnCare
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-chroncare}
      - DB_USERNAME=${DB_USERNAME:-chroncare}
      - DB_PASSWORD=${DB_PASSWORD:-chroncare}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - QUEUE_CONNECTION=redis
    command: php artisan queue:work --sleep=3 --tries=3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-chroncare}
      POSTGRES_USER: ${DB_USERNAME:-chroncare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chroncare}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ssl-certs:
